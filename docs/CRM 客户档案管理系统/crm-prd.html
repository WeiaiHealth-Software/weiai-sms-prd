      function renderNewVisitPage() {
        pageTitle.textContent = "新增就诊记录";

          ${topHero(
            "从档案列表直接进入的就诊录入页",
            "“新增就诊记录”不再作为左侧菜单模块存在，而是从档案列表、客户档案详情、预约管理等客户上下文中进入。这样信息架构更轻，录入动作更贴近实际工作流。",
            [

          <section class="grid gap-5 xl:grid-cols-[1.08fr_0.92fr]">
            <div class="space-y-5">
              <div class="glass rounded-[30px] border border-white/70 p-5 shadow-card">
                <div class="mb-4 flex items-center justify-between">
                  <div>
                    <div class="text-lg font-semibold text-ink">档案信息</div>
                    <div class="text-sm text-slate-500">从客户档案详情自动带入，减少重复录入</div>
                  </div>
                  <button data-page="detail" class="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm text-slate-600">查看档案详情</button>
                </div>
                <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                  <div class="rounded-2xl bg-slate-50 p-4"><div class="text-xs text-slate-500">患者姓名</div><div class="mt-1 font-semibold">${patient.name}</div></div>
                  <div class="rounded-2xl bg-slate-50 p-4"><div class="text-xs text-slate-500">编号</div><div class="mt-1 font-semibold">${patient.no}</div></div>
                  <div class="rounded-2xl bg-slate-50 p-4"><div class="text-xs text-slate-500">联系方式</div><div class="mt-1 font-semibold">${patient.mobile}</div></div>
                  <div class="rounded-2xl bg-slate-50 p-4"><div class="text-xs text-slate-500">责任验光师</div><div class="mt-1 font-semibold">${patient.owner}</div></div>
                </div>
              </div>

              <div class="glass rounded-[30px] border border-white/70 p-5 shadow-card">
                <div class="text-lg font-semibold text-ink">就诊与检查数据</div>
                <div class="mt-5 grid gap-4 md:grid-cols-2">
                  <label class="block"><span class="mb-2 block text-sm text-slate-500">就诊日期</span><input type="datetime-local" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm" value="2026-05-12T10:30" /></label>
                  <label class="block"><span class="mb-2 block text-sm text-slate-500">接诊门店</span><select class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"><option>徐汇旗舰店</option></select></label>
                  <label class="block"><span class="mb-2 block text-sm text-slate-500">接诊验光师</span><select class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"><option>王懿雯</option></select></label>
                  <label class="block"><span class="mb-2 block text-sm text-slate-500">就诊类型</span><select class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm"><option>复查</option><option>首诊</option><option>复诊</option></select></label>
                  <label class="block md:col-span-2"><span class="mb-2 block text-sm text-slate-500">主诉</span><textarea class="h-24 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm">复查视力变化，家长关心眼轴控制效果。</textarea></label>
                </div>

                <div class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                  ${[
                    ["右眼裸眼视力", "4.8"],
                    ["左眼裸眼视力", "4.9"],
                    ["右眼球镜", "-2.00"],
                    ["左眼球镜", "-1.75"],
                    ["右眼柱镜", "-0.50"],
                    ["左眼柱镜", "-0.25"],
                    ["眼轴", "24.22"],
                    ["眼压", "15"],
                  ]
                    .map(
                      ([label, value]) => `
                      <label class="block">
                        <span class="mb-2 block text-sm text-slate-500">${label}</span>
                        <input value="${value}" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm" />
                      </label>`
                    )
                    .join("")}
                </div>
              </div>
            </div>

            <div class="space-y-5">
              <div class="glass rounded-[30px] border border-white/70 p-5 shadow-card">
                <div class="text-lg font-semibold text-ink">诊断与方案</div>
                <div class="mt-4 space-y-4">
                  <label class="block">
                    <span class="mb-2 block text-sm text-slate-500">诊断结论</span>
                    <textarea class="h-28 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm">青少年近视进展期，眼轴增长趋势较上次放缓。</textarea>
                  </label>
                  <label class="block">
                    <span class="mb-2 block text-sm text-slate-500">主要治疗手段</span>
                    <input value="离焦镜片 + 视觉训练" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm" />
                  </label>
                  <label class="block">
                    <span class="mb-2 block text-sm text-slate-500">治疗方案</span>
                    <textarea class="h-28 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm">继续佩戴离焦镜片，每晚保持20分钟视觉训练，一个月后复查眼轴。</textarea>
                  </label>
                  <label class="block">
                    <span class="mb-2 block text-sm text-slate-500">推荐商品/套餐</span>
                    <input value="离焦镜片年度方案" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm" />
                  </label>
                  <label class="block">
                    <span class="mb-2 block text-sm text-slate-500">复查日期</span>
                    <input type="date" value="2026-06-12" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm" />
                  </label>
                </div>
              </div>

              <div class="glass rounded-[30px] border border-white/70 p-5 shadow-card">
                <div class="text-lg font-semibold text-ink">联动动作</div>
                <div class="mt-4 space-y-3">
                  <div class="rounded-2xl border border-emerald-100 bg-emerald-50 p-4 text-sm text-emerald-700">保存后自动生成病史时间轴条目</div>
                  <div class="rounded-2xl border border-brand/10 bg-brandSoft p-4 text-sm text-brand">可一键生成复查任务并同步进入回访管理</div>
                  <div class="rounded-2xl border border-slate-200 bg-white p-4 text-sm text-slate-600">若需要收费，可保存后直接跳转到单据收银</div>
                </div>
              </div>
            </div>
          </section>

          <div class="sticky bottom-4 mt-5 rounded-[26px] border border-slate-200 bg-white/90 p-4 shadow-card backdrop-blur">
            <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
              <div class="text-sm text-slate-500">当前为高保真原型：重点演示录入分组、字段保留与操作路径。</div>
              <div class="flex flex-wrap gap-3">
                <button class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-600">保存草稿</button>
                <button data-page="followups" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-600">保存并发起回访</button>
                <button class="rounded-2xl bg-brand px-5 py-3 text-sm font-medium text-white">保存并开单</button>
              </div>
            </div>
          </div>
        `;
      }

      function renderPage() {
        const pages = {
          customers: renderCustomersPage,
          tags: renderTagsPage,
          detail: renderDetailPage,
          appointments: renderAppointmentsPage,
          followups: renderFollowupsPage,
          history: renderHistoryPage,
          "new-visit": renderNewVisitPage,
        };
        app.innerHTML = pages[state.page]();
        syncNavState();
      }

      function syncNavState() {
        document.querySelectorAll(".nav-item").forEach((item) => {
          const active = item.dataset.page === state.page;
          item.className = `nav-item flex w-full items-center justify-between rounded-2xl px-3 py-3 text-left text-sm font-medium transition ${
            active ? "bg-brand text-white shadow-soft" : "text-slate-600 hover:bg-white"
          }`;
        });
      }

      document.addEventListener("click", (e) => {
        const pageEl = e.target.closest("[data-page]");
        if (pageEl) {
          const nextPage = pageEl.dataset.page;
          if (pageEl.dataset.selectPatient) state.selectedPatientId = pageEl.dataset.selectPatient;
          if (pageEl.dataset.selectVisit) {
            state.selectedVisitId = pageEl.dataset.selectVisit;
            state.page = "history";
            renderPage();
            return;
          }
          state.page = nextPage;
          renderPage();
          return;
        }

        const detailTab = e.target.closest("[data-detail-tab]");
        if (detailTab) {
          state.detailTab = detailTab.dataset.detailTab;
          renderPage();
          return;
        }

        const visitEditToggle = e.target.closest("[data-toggle-visit-edit]");
        if (visitEditToggle) {
          state.visitEditMode = !state.visitEditMode;
          renderPage();
          return;
        }

        const openTagModal = e.target.closest("[data-open-tag-modal]");
        if (openTagModal) {
          state.tagModalOpen = true;
          state.tagColorDropdownOpen = false;
          renderPage();
          return;
        }

        const closeTagModal = e.target.closest("[data-close-tag-modal]");
        if (closeTagModal) {
          state.tagModalOpen = false;
          state.tagColorDropdownOpen = false;
          renderPage();
          return;
        }

        const tagPage = e.target.closest("[data-tag-page]");
        if (tagPage) {
          state.tagPage = Number(tagPage.dataset.tagPage);
          renderPage();
          return;
        }

        const openTagColorDropdown = e.target.closest("[data-open-tag-color-dropdown]");
        if (openTagColorDropdown) {
          state.tagColorDropdownOpen = !state.tagColorDropdownOpen;
          renderPage();
          return;
        }

        const selectTagColor = e.target.closest("[data-select-tag-color]");
        if (selectTagColor) {
          state.selectedTagColor = selectTagColor.dataset.selectTagColor;
          state.tagColorDropdownOpen = false;
          renderPage();
          return;
        }

        const visitItem = e.target.closest("[data-select-visit]");
        if (visitItem) {
          state.selectedVisitId = visitItem.dataset.selectVisit;
          renderPage();
          return;
        }

        const metric = e.target.closest("[data-metric]");
        if (metric) {
          state.selectedMetric = metric.dataset.metric;
          renderPage();
        }
      });

      document.addEventListener("change", (e) => {
        const tagFilter = e.target.closest("[data-tag-filter]");
        if (tagFilter) {
          state.tagFilter = tagFilter.value;
          state.tagPage = 1;
          renderPage();
        }
      });

      renderPage();
    </script>
  </body>
</html>
